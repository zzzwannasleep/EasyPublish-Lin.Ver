name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to publish, for example v0.1.0. Defaults to v<package.json version>.'
        required: false
        type: string
      release_name:
        description: 'Release title shown in GitHub Releases'
        required: false
        type: string
      draft:
        description: 'Create release as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_draft: ${{ steps.meta.outputs.release_draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const pkg = require('./package.json')
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'))
          const inputs = event.inputs || {}
          const outputPath = process.env.GITHUB_OUTPUT

          const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/
          const refName = (process.env.GITHUB_REF_NAME || '').trim()
          const refType = (process.env.GITHUB_REF_TYPE || '').trim()
          const inputTag = String(inputs.release_tag || '').trim()
          const inputName = String(inputs.release_name || '').trim()
          const inputDraft = Object.prototype.hasOwnProperty.call(inputs, 'draft') ? String(inputs.draft).trim() : ''

          let releaseTag = refType === 'tag' ? refName : inputTag
          let releaseVersion =
            refType === 'tag'
              ? refName.replace(/^v/, '')
              : (releaseTag ? releaseTag.replace(/^v/, '') : '') || pkg.version

          if (!releaseTag) {
            releaseTag = `v${releaseVersion}`
          }
          if (!releaseTag.startsWith('v')) {
            releaseTag = `v${releaseTag}`
          }
          if (!semverPattern.test(releaseVersion)) {
            throw new Error(`Invalid release version: ${releaseVersion}`)
          }

          const releaseName = inputName || `Nexus Publish ${releaseTag}`
          const releaseDraft = inputDraft === 'true' ? 'true' : 'false'

          fs.appendFileSync(outputPath, `release_version=${releaseVersion}\n`)
          fs.appendFileSync(outputPath, `release_tag=${releaseTag}\n`)
          fs.appendFileSync(outputPath, `release_name=${releaseName}\n`)
          fs.appendFileSync(outputPath, `release_draft=${releaseDraft}\n`)
          NODE

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            build_command: npm run prepare:win-output && npm run build && npx electron-builder -p never --win nsis portable zip
            artifact_name: release-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/*.zip
              dist/latest.yml
          - label: Linux
            os: ubuntu-latest
            build_command: npm run build:linux
            artifact_name: release-linux
            artifact_paths: |
              dist/*.deb
              dist/latest-linux.yml
          - label: macOS
            os: macos-latest
            build_command: npm run build:mac
            artifact_name: release-macos
            artifact_paths: |
              dist/*.dmg
              dist/*.pkg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process')

          const targetVersion = process.env.RELEASE_VERSION
          const pkg = require('./package.json')

          if (pkg.version === targetVersion) {
            console.log(`package.json version already set to ${targetVersion}; skipping stamp.`)
            process.exit(0)
          }

          const npmCommand = process.platform === 'win32' ? 'npm.cmd' : 'npm'
          execFileSync(npmCommand, ['version', '--no-git-tag-version', targetVersion], {
            stdio: 'inherit'
          })
          NODE

      - name: Build package
        run: ${{ matrix.build_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 7
          path: ${{ matrix.artifact_paths }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          find release-assets -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Prepare release notes
        shell: bash
        env:
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Commit: \`${RELEASE_COMMIT}\`"
            echo
            echo "## Changes"
            echo
            echo "- Automated release build."
            echo "- See \`README.md\` for the current onboarding guide and usage notes."
          } > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          draft: ${{ needs.prepare.outputs.release_draft }}
          prerelease: false
          files: release-assets/**
          overwrite_files: true
          fail_on_unmatched_files: true
