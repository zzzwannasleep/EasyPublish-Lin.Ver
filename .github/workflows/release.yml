name: Build and Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare Release Version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Compute release version
        id: version
        shell: bash
        run: |
          release_version=$(node <<'NODE'
          const pkg = require('./package.json')
          const [major, minor, patch] = pkg.version.split('.').map((value) => Number.parseInt(value, 10))
          if ([major, minor, patch].some((value) => Number.isNaN(value))) {
            throw new Error(`package.json version must be major.minor.patch, got ${pkg.version}`)
          }

          const runNumber = Number.parseInt(process.env.GITHUB_RUN_NUMBER || '0', 10)
          const runAttempt = Number.parseInt(process.env.GITHUB_RUN_ATTEMPT || '1', 10)

          // Keep the configured major/minor version, and derive a monotonic patch
          // from the workflow run so every build publishes a distinct release.
          const releasePatch = patch * 1000000 + runNumber * 100 + runAttempt
          process.stdout.write(`${major}.${minor}.${releasePatch}`)
          NODE
          )

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$release_version" >> "$GITHUB_OUTPUT"
          echo "release_name=Nexus Publish v$release_version" >> "$GITHUB_OUTPUT"

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: npm version --no-git-tag-version "$RELEASE_VERSION"

      - name: Build Windows package
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.zip
            dist/latest.yml

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: npm version --no-git-tag-version "$RELEASE_VERSION"

      - name: Build Linux package
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          if-no-files-found: error
          path: |
            dist/*.deb
            dist/latest-linux.yml

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: npm version --no-git-tag-version "$RELEASE_VERSION"

      - name: Build macOS package
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          if-no-files-found: warn
          path: |
            dist/*.dmg
            dist/*.pkg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  upload_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build_windows
      - build_linux
      - build_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-dist
          path: release-assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: release-assets/linux

      - name: Download macOS artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: release-assets/macos

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          name: ${{ needs.prepare_release.outputs.release_name }}
          draft: false
          prerelease: false
          target_commitish: ${{ github.sha }}
          body_path: NEW.md
          files: release-assets/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
