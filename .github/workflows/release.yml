name: Build and Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows package
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.zip
            dist/latest.yml

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux package
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          if-no-files-found: error
          path: |
            dist/*.deb
            dist/latest-linux.yml

  build_macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS package
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          if-no-files-found: warn
          path: |
            dist/*.dmg
            dist/*.pkg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  upload_release:
    name: Upload Draft Release
    runs-on: ubuntu-latest
    needs:
      - build_windows
      - build_linux
      - build_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Read package version
        shell: bash
        run: |
          echo "PACKAGE_VERSION=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-dist
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: release-assets

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: Nexus Publish v${{ env.PACKAGE_VERSION }}
          draft: true
          prerelease: false
          target_commitish: ${{ github.sha }}
          body_path: NEW.md
          files: release-assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
